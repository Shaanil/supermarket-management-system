<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuickMart — Payment Options</title>
  <meta name="theme-color" content="#ffffff" />
  <style>
    :root{
      --bg:#ffffff; --surface:#f6f7f9; --ink:#111111; --muted:#5f6368; --accent:#06c167; --accent2:#0077ff; --danger:#d32f2f; --wire:#e5e7eb; --card:#ffffff; --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:14px; --radius-sm:10px; --radius-lg:22px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}

    .wrap{max-width:920px;margin:24px auto;padding:0 18px}
    .card{background:var(--card);border:1px solid var(--wire);border-radius:var(--radius);box-shadow:var(--shadow)}
    .pad{padding:18px}

    header.h{
      position:sticky;top:0;z-index:5;backdrop-filter:saturate(140%) blur(10px);
      background:linear-gradient(90deg, rgba(255,255,255,.9), rgba(250,250,255,.9));
      border-bottom:1px solid var(--wire);
    }
    header.h .bar{max-width:920px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:10px;align-items:center;font-weight:700}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(6,193,103,.12)}

    h1{font-size:24px;letter-spacing:-.01em;margin:0 0 6px 0}
    p.lead{color:var(--muted);margin:0}

    /* Existing methods */
    .methods{display:grid;gap:12px}
    .method{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;border:1px solid var(--wire);border-radius:12px;background:#fff;padding:12px}
    .method:hover{border-color:var(--accent2)}
    .badge{font-size:12px;color:#fff;background:var(--accent2);padding:2px 8px;border-radius:999px}
    .meta{color:var(--muted);font-size:14px}
    .total-chip{ display:inline-block; padding:6px 10px; border-radius:10px; background: var(--surface); border:1px solid var(--wire); font-size:14px; }

    .empty{padding:12px;border:1px dashed var(--wire);border-radius:12px;background:var(--surface);color:var(--muted)}

    .row{display:flex;gap:10px;align-items:center}
    .space{height:16px}

    .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--wire);background:var(--surface);color:var(--ink);padding:10px 14px;border-radius:12px;cursor:pointer;transition:.2s ease;text-decoration:none}
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
    .btn.primary:hover{background:#04a85a;border-color:#04a85a}
    .btn.ghost{background:transparent}

    /* Add new form */
    form label{display:block;font-weight:600;margin-top:10px}
    input,select{width:100%;padding:10px;border:1px solid var(--wire);border-radius:10px;background:#fff}
    .grid{display:grid;gap:12px}
    .grid.cols-2{grid-template-columns:1fr 1fr}

    .note{color:var(--muted);font-size:13px;margin-top:4px}

    /* A11y live region */
    .sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,1px,1px);white-space:nowrap;border:0}

    @media (max-width:720px){ .grid.cols-2{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div id="live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <header class="h">
    <div class="bar">
      <div class="brand"><span class="dot"></span> QuickMart</div>
      <strong>Payment</strong>
    </div>
  </header>

  <main class="wrap">
    <section class="card pad" aria-labelledby="title-methods">
      <h1 id="title-methods">Select a payment method</h1>
      <p class="lead">Choose an existing method or add a new one below.</p>
      <div class="row" style="justify-content: space-between; align-items:center; margin-top:8px">
        <span class="total-chip">Total: <strong th:text="${'Rs ' + total}">Rs 0</strong></span>
        <a href="/customer/dashboard" class="btn ghost">Back to Checkout</a>
      </div>

      <div class="methods" style="margin-top:14px">
        <form th:each="p : ${payments}" th:action="@{/customer/payments/select}" method="post" class="method">
          <input type="hidden" name="paymentId" th:value="${p.id}" />
          <input type="hidden" name="amount" th:value="${total}" />
          <div>
            <div class="row">
              <span class="badge" th:text="${p.type}">CARD</span>
              <strong th:text="${p.type == 'CARD' ? p.cardHolderName : (p.type == 'PAYPAL' ? 'PayPal' : (p.type == 'OTHER' ? 'Other' : 'Cash on Delivery'))}">John Smith</strong>
            </div>
            <div class="meta" th:text="${p.type == 'CARD' ? ('•••• ' + (p.cardNumber != null ? #strings.substring(p.cardNumber, T(java.lang.Math).max(#strings.length(p.cardNumber) - 4, 0), #strings.length(p.cardNumber)) : '????')) : (p.type == 'PAYPAL' ? 'Pay with PayPal' : (p.type == 'OTHER' ? p.customMessage : 'Pay with cash upon delivery'))}">•••• 1234</div>
          </div>
          <div class="row" style="justify-content:flex-end">
            <button type="submit" class="btn primary">Use</button>
          </div>
        </form>

        <div class="empty" th:if="${#lists.isEmpty(payments)}">No payment methods saved yet. Add one below.</div>
      </div>
    </section>

    <div class="space"></div>

    <section class="card pad" aria-labelledby="title-add">
      <h1 id="title-add">Add a payment method</h1>
      <p class="lead">Cards are saved securely. Other lets you specify a custom instruction.</p>

      <form th:action="@{/payment/add}" method="post" id="addForm">
        <label for="typeSelect">Type</label>
        <select name="type" id="typeSelect" onchange="toggleFields()" required>
          <option value="CARD">Card</option>
          <option value="PAYPAL">PayPal</option>
          <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
          <option value="OTHER">Other</option>
        </select>

        <div id="cardFields" class="grid cols-2" style="margin-top:8px">
          <div>
            <label for="cardHolderName">Cardholder Name</label>
            <input type="text" id="cardHolderName" name="cardHolderName" placeholder="Amal Perera" autocomplete="cc-name" />
          </div>
          <div>
            <label for="cardNumber">Card Number</label>
            <input type="text" id="cardNumber" name="cardNumber" placeholder="4720 1699 5044 6170" inputmode="numeric" maxlength="19" autocomplete="cc-number" />
            <div class="note"></div>
          </div>
          <div>
            <label for="expiry">Expiry</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" inputmode="numeric" maxlength="5" autocomplete="cc-exp" />
          </div>
          <div>
            <label for="cvv">CVV</label>
            <input type="password" id="cvv" name="cvv" placeholder="123" inputmode="numeric" maxlength="4" autocomplete="cc-csc" />
          </div>
        </div>

        <div id="otherField" style="display:none;margin-top:8px">
          <label for="customMessage">Custom payment info</label>
          <input type="text" id="customMessage" name="customMessage" placeholder="Bank Account Number, Mobile Number" />

        </div>

        <div class="space"></div>
        <div class="row" style="justify-content:flex-end">
          <button type="submit" class="btn primary">Add Payment Method</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    function $(id){ return document.getElementById(id); }

    function toggleFields(){
      const type = $("typeSelect").value;
      $("cardFields").style.display = (type === "CARD") ? "grid" : "none";
      $("otherField").style.display = (type === "OTHER") ? "block" : "none";
      announce(type === 'CARD' ? 'Card fields shown' : (type === 'PAYPAL' ? 'PayPal selected' : (type === 'OTHER' ? 'Other field shown' : 'Cash on delivery selected')));
    }

    // Lightweight formatting for card number and expiry
    const cn = $("cardNumber");
    if (cn) cn.addEventListener('input', (e)=>{
      let v = e.target.value.replace(/\D/g,'').slice(0,16);
      e.target.value = v.replace(/(\d{4})(?=\d)/g,'$1 ');
    });
    const ex = $("expiry");
    if (ex) ex.addEventListener('input', (e)=>{
      let v = e.target.value.replace(/\D/g,'').slice(0,4);
      if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
      e.target.value = v;
    });

    function announce(msg){
      const el = document.getElementById('live');
      if (!el) return; el.textContent = msg; clearTimeout(el._t); el._t = setTimeout(()=>{ el.textContent=''; }, 1500);
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', toggleFields);
  </script>
</body>
</html>
